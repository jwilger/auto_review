# bacon — focused Rust checks only.
#
# Runtime development now uses the same Nix-built container image as deploy:
#
#   nix run .#dev-gateway-container
#
# That watcher rebuilds .#ar-gateway-image, loads it into podman/docker, and
# relaunches the gateway on 127.0.0.1:8090. Bacon remains useful for quick
# foreground `bacon check`, `bacon clippy`, and `bacon test` loops, but it no
# longer owns process restart.

default_job = "check"
