# Example .auto_review.yaml.
# Copy this to .auto_review.yaml at the root of any repo the bot reviews
# and tune to taste. Anything you omit falls back to defaults.

# Master switch. Set to false to skip review for this repo entirely while
# leaving the webhook in place. The bot will post a "skipped" commit
# status and return without calling the LLM.
enabled: true

# Qualitative PR metadata check. Existing repos may keep the boolean form
# (`pr_metadata_check: true/false`). Use object form to tune individual
# expectations while keeping the gate enabled.
pr_metadata_check:
  enabled: true
  checks:
    # When false, an empty PR body is allowed, but other metadata failures
    # such as bad titles or mixed title/body failures still block.
    body_required: true
  additional_rules:
    - "Security-sensitive changes must describe the threat model impact."
    - "Schema migrations must mention rollback risk."

# Free-form text injected into the LLM system prompt as authoritative
# project conventions. Use sparingly — every byte costs tokens, and the
# model already follows reasonable defaults. Examples of good content:
#
#   - "All public APIs must have rustdoc."
#   - "Forbid unwrap() and expect() outside #[cfg(test)]."
#   - "Prefer total functions: validate at boundaries, not on use."
#
# Examples of bad content:
#
#   - "Be helpful." (too vague to be actionable)
#   - "Find all bugs." (the model is already trying to)
guidelines: |
  Always prefer total functions over partial ones.
  Forbid `unwrap()` and `expect()` outside `#[cfg(test)]` modules.
  Reach for `thiserror` for library errors and `anyhow` for binaries.

# Gitignore-style globs. Matching files are stripped from the diff sent
# to the LLM AND from the changed-files list. Useful for vendored code,
# generated output, and large data fixtures the bot has nothing useful
# to say about.
ignored_paths:
  - "vendor/**"
  - "third_party/**"
  - "src/generated/**"
  - "*.snap"
