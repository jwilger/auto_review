name: auto_review
description: Submit Forgejo pull request CI reviews to an auto_review gateway.
author: auto_review contributors

inputs:
  gateway-url:
    description: auto_review gateway base URL.
    required: true
  action-token:
    description: Bearer token authorized to submit CI review requests to the gateway.
    required: true
  owner:
    description: Optional override for the Forgejo repository owner. Defaults to the pull request context.
    required: false
    default: ""
  repo:
    description: Optional override for the Forgejo repository name. Defaults to the pull request context.
    required: false
    default: ""
  pr-number:
    description: Optional override for the Forgejo pull request number. Defaults to the pull request context.
    required: false
    default: ""
  head-sha:
    description: Optional override for the pull request head commit SHA to review. Defaults to the pull request context.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Request CI review
      shell: bash
      env:
        GATEWAY_URL: ${{ inputs.gateway-url }}
        ACTION_TOKEN: ${{ inputs.action-token }}
      run: |
        OWNER=${{ inputs.owner }}
        OWNER="${OWNER:-${{ github.repository_owner }}}"
        REPO=${{ inputs.repo }}
        REPO="${REPO:-${{ github.event.repository.name }}}"
        PR_NUMBER=${{ inputs.pr-number }}
        PR_NUMBER="${PR_NUMBER:-${{ github.event.pull_request.number }}}"
        HEAD_SHA=${{ inputs.head-sha }}
        HEAD_SHA="${HEAD_SHA:-${{ github.event.pull_request.head.sha }}}"

        if [ -z "$PR_NUMBER" ]; then
          echo "auto_review requires pull request context; inputs.pr-number and github.event.pull_request.number are missing" >&2
          exit 1
        fi
        if [ -z "$OWNER" ] || [ -z "$REPO" ] || [ -z "$HEAD_SHA" ]; then
          echo "auto_review requires pull request context; owner, repo, and head SHA must be available" >&2
          exit 1
        fi

        JSON_PAYLOAD=$(cat <<JSON
        {"owner":"$OWNER","repo":"$REPO","pr_number":$PR_NUMBER,"head_sha":"$HEAD_SHA"}
        JSON
        )

        curl -fsS --connect-timeout 5 --max-time 30 -X POST \
          -H "Authorization: Bearer $ACTION_TOKEN" \
          -H "Content-Type: application/json" \
          --data "$JSON_PAYLOAD" \
          "$GATEWAY_URL/reviews/ci"

branding:
  icon: book-open
  color: gray-dark
