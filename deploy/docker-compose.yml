# Self-hosted deployment template.
# Run alongside an existing Forgejo instance; point Forgejo's PR webhook
# at http://gateway:8080/webhooks/forgejo.

services:
  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: auto_review:dev
    restart: unless-stopped
    environment:
      - RUST_LOG=info,ar_gateway=debug
      - DATABASE_URL=postgres://auto:auto@db:5432/auto_review
      - FORGEJO_BASE_URL=${FORGEJO_BASE_URL}
      - FORGEJO_TOKEN=${FORGEJO_TOKEN}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_REASONING_MODEL=${LLM_REASONING_MODEL:-qwen2.5-coder:32b}
      # Optional: enable RAG by setting an embedding model.
      - LLM_EMBEDDING_MODEL=${LLM_EMBEDDING_MODEL:-}
      # Optional: enable LLM-driven triage by setting a cheap model.
      - LLM_CHEAP_MODEL=${LLM_CHEAP_MODEL:-}
      # Optional: persist learnings across restarts.
      - AR_LEARNINGS_DB=${AR_LEARNINGS_DB:-/data/learnings.sqlite}
      # Optional: enable hardened sandbox for linter exec. Requires
      # podman on the gateway host (mount the podman socket below) and
      # the sandbox image pre-pulled. Leave unset for local-dev only.
      - AR_SANDBOX_IMAGE=${AR_SANDBOX_IMAGE:-}
    ports:
      - "8080:8080"
    depends_on:
      - db
    volumes:
      - data:/data

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=auto
      - POSTGRES_PASSWORD=auto
      - POSTGRES_DB=auto_review
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  data:
  pgdata:
