name: AgentCore semantic review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  semantic-review:
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AUTO_REVIEW_AGENTCORE_INVOKE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Invoke AgentCore runtime
        env:
          AGENTCORE_INVOKE_URL: ${{ vars.AUTO_REVIEW_AGENTCORE_INVOKE_URL }}
          GITHUB_INSTALLATION_ID: ${{ vars.AUTO_REVIEW_GITHUB_INSTALLATION_ID }}
        run: |
          # Payload contract includes: provider: github, kind: semantic_review,
          # owner, repo, pr_number, head_sha, and installation_id.
          payload="$(jq -nc \
            --arg provider github \
            --arg kind semantic_review \
            --arg owner "${{ github.repository_owner }}" \
            --arg repo "${{ github.event.repository.name }}" \
            --arg head_sha "${{ github.event.pull_request.head.sha }}" \
            --argjson pr_number "${{ github.event.pull_request.number }}" \
            --argjson installation_id "$GITHUB_INSTALLATION_ID" \
            '{provider:$provider, kind:$kind, owner:$owner, repo:$repo, pr_number:$pr_number, head_sha:$head_sha, installation_id:$installation_id}')"
          aws --region "${{ vars.AWS_REGION }}" \
            bedrock-agentcore-runtime invoke-agent-runtime \
            --cli-binary-format raw-in-base64-out \
            --runtime-session-id "${{ github.run_id }}-${{ github.run_attempt }}" \
            --agent-runtime-arn "${{ vars.AUTO_REVIEW_AGENTCORE_RUNTIME_ARN }}" \
            --payload "$payload"
