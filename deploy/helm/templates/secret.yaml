{{- if not .Values.secrets.secretRef }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auto-review.fullname" . }}
  labels:
    {{- include "auto-review.labels" . | nindent 4 }}
type: Opaque
stringData:
  AR_FORGEJO_TOKEN: {{ required "secrets.forgejoToken or secrets.secretRef is required" .Values.secrets.forgejoToken | quote }}
  WEBHOOK_SECRET: {{ required "secrets.webhookSecret or secrets.secretRef is required" .Values.secrets.webhookSecret | quote }}
  AR_CI_REVIEW_TOKEN: {{ required "secrets.ciReviewToken or secrets.secretRef is required" .Values.secrets.ciReviewToken | quote }}
  {{- if .Values.secrets.llmApiKey }}
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  {{- end }}
{{- end }}
