apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "auto-review.fullname" . }}
  labels:
    {{- include "auto-review.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "auto-review.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "auto-review.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: AR_GATEWAY_BIND
              value: "0.0.0.0:8080"
            - name: RUST_LOG
              value: {{ .Values.logging.rustLog | quote }}
            - name: FORGEJO_BASE_URL
              value: {{ required "config.forgejoBaseUrl is required" .Values.config.forgejoBaseUrl | quote }}
            - name: LLM_BASE_URL
              value: {{ required "config.llmBaseUrl is required" .Values.config.llmBaseUrl | quote }}
            - name: LLM_REASONING_MODEL
              value: {{ .Values.config.llmReasoningModel | quote }}
            {{- if .Values.config.llmEmbeddingModel }}
            - name: LLM_EMBEDDING_MODEL
              value: {{ .Values.config.llmEmbeddingModel | quote }}
            {{- end }}
            {{- if .Values.config.llmCheapModel }}
            - name: LLM_CHEAP_MODEL
              value: {{ .Values.config.llmCheapModel | quote }}
            {{- end }}
            {{- if .Values.config.learningsDb }}
            - name: AR_LEARNINGS_DB
              value: {{ .Values.config.learningsDb | quote }}
            {{- end }}
            {{- if .Values.config.historyDb }}
            - name: AR_HISTORY_DB
              value: {{ .Values.config.historyDb | quote }}
            {{- end }}
            {{- if .Values.config.sandboxImage }}
            - name: AR_SANDBOX_IMAGE
              value: {{ .Values.config.sandboxImage | quote }}
            {{- end }}
            {{- if .Values.config.botLogin }}
            - name: AR_BOT_LOGIN
              value: {{ .Values.config.botLogin | quote }}
            {{- end }}
            {{- if .Values.config.botName }}
            - name: AR_BOT_NAME
              value: {{ .Values.config.botName | quote }}
            {{- end }}
            {{- if .Values.config.severityFloor }}
            - name: AR_SEVERITY_FLOOR
              value: {{ .Values.config.severityFloor | quote }}
            {{- end }}
            {{- if .Values.config.reviewConcurrency }}
            - name: AR_REVIEW_CONCURRENCY
              value: {{ .Values.config.reviewConcurrency | quote }}
            {{- end }}
            {{- if .Values.config.webhookRatePerSec }}
            - name: AR_WEBHOOK_RATE_PER_SEC
              value: {{ .Values.config.webhookRatePerSec | quote }}
            {{- end }}
            {{- if .Values.config.webhookBurst }}
            - name: AR_WEBHOOK_BURST
              value: {{ .Values.config.webhookBurst | quote }}
            {{- end }}
            {{- if .Values.config.pollIntervalSecs }}
            - name: AR_POLL_INTERVAL_SECS
              value: {{ .Values.config.pollIntervalSecs | quote }}
            {{- end }}
            {{- if .Values.config.readinessTtlSecs }}
            - name: AR_READINESS_TTL_SECS
              value: {{ .Values.config.readinessTtlSecs | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "auto-review.secretName" . }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /tmp
            {{- if .Values.securityContext.readOnlyRootFilesystem }}
            - name: cargo-cache
              mountPath: /home/auto/.cargo
            {{- end }}
      volumes:
        - name: workspace
          {{- if .Values.ephemeralStorage.enabled }}
          emptyDir:
            sizeLimit: {{ .Values.ephemeralStorage.sizeLimit }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.securityContext.readOnlyRootFilesystem }}
        - name: cargo-cache
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
