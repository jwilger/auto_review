# Default values for the auto-review Helm chart.

image:
  repository: codeberg.org/jwilger/auto_review
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicaCount: 1

# Required configuration. Provide as Helm --set values, in a values
# override file, or via secretRef (recommended for tokens).
config:
  forgejoBaseUrl: ""        # e.g. https://forgejo.example.com
  llmBaseUrl: ""            # e.g. http://ollama:11434 or https://api.openai.com
  llmReasoningModel: "qwen2.5-coder:32b"
  llmEmbeddingModel: ""     # optional; enables RAG
  llmCheapModel: ""         # optional; enables LLM triage + verifier
  # Paths to the SQLite databases. NOTE: these need a persistent
  # volume mounted at /data for the data to survive pod restarts
  # — the chart's default `ephemeralStorage:` block only covers
  # /tmp. Add a PVC or hostPath mount at /data via a custom
  # template overlay if you want survival; without it, leave
  # both fields as "" and accept the volatile-in-memory path.
  # The bot still works either way; the in-memory path just
  # means every restart re-reviews open PRs from scratch and
  # forgets every `@<bot> remember` entry.
  learningsDb: ""        # e.g. "/data/learnings.sqlite"
  historyDb: ""          # e.g. "/data/review_history.sqlite"
  # Bot identity. Operators usually want a dedicated Forgejo user
  # named something other than `auto_review` for clarity in PR
  # threads. botLogin is what the bot authenticates as;
  # botName is the @<handle> users mention.
  botLogin: ""
  botName: ""
  # Severity floor for posted findings: "warning" (default; drop
  # note-only nits), "note" (post everything including the LLM's
  # scratchpad observations), or "error" (only post Error-severity
  # findings). Cost + signal-to-noise lever; bot still generates
  # and verifies dropped findings, only posting changes. Leave
  # blank to take the gateway default (warning).
  severityFloor: ""
  # Cap on concurrent in-flight reviews. Without it a burst of N
  # PRs spawns N tmpdirs + N concurrent LLM calls. Tune for
  # high-traffic instances or expensive cloud LLMs.
  reviewConcurrency: ""
  # Webhook rate limiter. Both must be set together; per-second
  # rate and burst capacity. T7 (resource exhaustion) mitigation.
  webhookRatePerSec: ""
  webhookBurst: ""
  # Background-poller cadence (seconds). 0 disables. The poller
  # picks up `@<bot>` mentions inside inline review threads
  # which Forgejo's pull_request_review_comment webhook doesn't
  # fire reliably for.
  pollIntervalSecs: ""
  # /readyz cache TTL (seconds). Lower for faster Forgejo-down
  # detection; higher to reduce probe load on Forgejo.
  readinessTtlSecs: ""

# Secrets. Either set inline (NOT recommended for production) or set
# secretRef to the name of an existing Secret carrying the same keys.
# When secretRef is set, the inline values are ignored.
secrets:
  forgejoToken: ""
  webhookSecret: ""
  llmApiKey: ""
  secretRef: ""

service:
  type: ClusterIP
  port: 8080
  # When using an Ingress, point the Forgejo webhook at the Ingress
  # host. When exposing directly via NodePort/LoadBalancer, point at
  # the resulting external endpoint.

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: reviewer.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Pod security: run as non-root, drop capabilities. The image
# already creates a `auto` user; these settings reinforce.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

logging:
  rustLog: "info,ar_gateway=debug"

# emptyDir for the workspace clones. Persistent storage isn't
# required — each review uses a fresh tempdir.
ephemeralStorage:
  enabled: true
  sizeLimit: 5Gi

nodeSelector: {}
tolerations: []
affinity: {}
