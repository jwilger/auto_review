[toolchain]
# Pinned single source of truth for the project's Rust toolchain.
#
# `nightly` because auto_review is an application we control end-
# to-end, not a library: there's no MSRV obligation, and we want
# newer compiler optimizations, stricter clippy lints, and access
# to language features as they land. The text "nightly" looks
# floating, but the *actual* resolved toolchain is locked by
# `flake.lock`'s rust-overlay revision — every dev shell and CI
# job picks up the same nightly snapshot bit-for-bit until you
# explicitly run `nix flake update`.
#
# The flake reads this file via `rust-overlay`'s
# `fromRustupToolchainFile`; the dev shell, every `nix flake
# check`, and CI all use the same toolchain. Bumping is done by
# running `nix flake update rust-overlay` and committing the
# resulting `flake.lock` change.
channel = "nightly"
components = ["rustfmt", "clippy", "rust-src", "rust-analyzer"]
profile = "minimal"
