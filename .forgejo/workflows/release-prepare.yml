name: Prepare release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-prepare:
    runs-on: docker-release
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release') }}"
    steps:
      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ ! -x "$NIX_BIN_DIR/nix" ]; then
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"
          # Nix refuses to run a local build when any build-dir ancestor is
          # world-writable. The gitea runner image ships / as 0777, which blocks
          # building store paths that are not on a binary cache (e.g. the rust
          # nightly toolchain). Tighten it so local builds work.
          chmod 0755 /
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - env:
          RELEASE_PREPARE_TOKEN: ${{ secrets.RELEASE_PREPARE_TOKEN }}
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          RELEASE_BOT_NAME: ${{ vars.RELEASE_BOT_NAME }}
          RELEASE_BOT_EMAIL: ${{ vars.RELEASE_BOT_EMAIL }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_PREPARE_TOKEN:-}" ]; then
            printf 'missing RELEASE_PREPARE_TOKEN\n' >&2
            exit 1
          fi
          if [ -z "${RELEASE_SIGNING_KEY:-}" ]; then
            printf 'missing RELEASE_SIGNING_KEY\n' >&2
            exit 1
          fi
          if [ -z "${RELEASE_BOT_NAME:-}" ] || [ -z "${RELEASE_BOT_EMAIL:-}" ]; then
            printf 'missing release bot identity\n' >&2
            exit 1
          fi
          signing_key="${RUNNER_TEMP:-/tmp}/release-signing-key"
          printf '%s\n' "$RELEASE_SIGNING_KEY" > "$signing_key"
          chmod 600 "$signing_key"
          export GIT_AUTHOR_NAME="$RELEASE_BOT_NAME"
          export GIT_AUTHOR_EMAIL="$RELEASE_BOT_EMAIL"
          export GIT_COMMITTER_NAME="$RELEASE_BOT_NAME"
          export GIT_COMMITTER_EMAIL="$RELEASE_BOT_EMAIL"
          export GIT_CONFIG_COUNT=4
          export GIT_CONFIG_KEY_0=gpg.format
          export GIT_CONFIG_VALUE_0=ssh
          export GIT_CONFIG_KEY_1=user.signingkey
          export GIT_CONFIG_VALUE_1="$signing_key"
          export GIT_CONFIG_KEY_2=commit.gpgsign
          export GIT_CONFIG_VALUE_2=true
          export GIT_CONFIG_KEY_3=url.https://release:${RELEASE_PREPARE_TOKEN}@git.johnwilger.com/.insteadOf
          export GIT_CONFIG_VALUE_3=https://git.johnwilger.com/
          git fetch --tags
          release_plan="$(nix develop --command scripts/release plan --workspace .)"
          CONVENTIONAL_RELEASE_TYPE="$(printf '%s\n' "$release_plan" | awk -F= '$1 == "release_type" { print $2 }')"
          BASELINE_TAG="$(printf '%s\n' "$release_plan" | awk -F= '$1 == "baseline_tag" { print $2 }')"
          release_type_rank() {
            case "$1" in
              patch) printf '0' ;;
              minor) printf '1' ;;
              major) printf '2' ;;
              *) return 1 ;;
            esac
          }
          SEMVER_MINIMUM_RELEASE_TYPE="$CONVENTIONAL_RELEASE_TYPE"
          if [ -n "$BASELINE_TAG" ]; then
            SEMVER_MINIMUM_RELEASE_TYPE=""
            for candidate_type in patch minor major; do
              if nix develop --command cargo semver-checks --workspace --baseline-rev "$BASELINE_TAG" --release-type "$candidate_type"; then
                SEMVER_MINIMUM_RELEASE_TYPE="$candidate_type"
                break
              fi
            done
            if [ -z "$SEMVER_MINIMUM_RELEASE_TYPE" ]; then
              printf 'cargo semver-checks did not accept any release type against baseline %s\n' "$BASELINE_TAG" >&2
              exit 1
            fi
          fi
          if [ "$(release_type_rank "$SEMVER_MINIMUM_RELEASE_TYPE")" -gt "$(release_type_rank "$CONVENTIONAL_RELEASE_TYPE")" ]; then
            RELEASE_TYPE="$SEMVER_MINIMUM_RELEASE_TYPE"
          else
            RELEASE_TYPE="$CONVENTIONAL_RELEASE_TYPE"
          fi
          selected_plan="$(nix develop --command scripts/release plan --workspace . --release-type "$RELEASE_TYPE")"
          RELEASE_VERSION="$(printf '%s\n' "$selected_plan" | awk -F= '$1 == "version" { print $2 }')"
          if [ -z "$RELEASE_VERSION" ] || [ -z "$RELEASE_TYPE" ]; then
            printf 'release plan did not produce a version and release type\n' >&2
            exit 1
          fi
          branch="release/v$RELEASE_VERSION"
          git switch -C "$branch"
          nix develop --command scripts/release prepare --workspace . --version "$RELEASE_VERSION" --date "$(date +%F)"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          if git diff --cached --quiet; then
            printf 'release metadata already up to date for v%s\n' "$RELEASE_VERSION"
            exit 0
          fi
          git commit -m "chore: release v$RELEASE_VERSION"
          nix develop --command git push --no-verify --force-with-lease origin "$branch"
          export GITEA_SERVER_URL="https://git.johnwilger.com"
          export GITEA_SERVER_TOKEN="$RELEASE_PREPARE_TOKEN"
          tea_login="auto_review-release-${GITHUB_RUN_ID:-$$}"
          nix develop --command tea login add --name "$tea_login" --url "$GITEA_SERVER_URL" --token "$GITEA_SERVER_TOKEN"
          open_prs_json="${RUNNER_TEMP:-/tmp}/release-open-prs.json"
          export OPEN_PRS_JSON="$open_prs_json"
          export RELEASE_BRANCH="$branch"
          export RELEASE_VERSION
          export TEA_LOGIN="$tea_login"
          nix develop --command bash -c 'set -euo pipefail
            curl -fsS \
            -H "Authorization: token $GITEA_SERVER_TOKEN" \
            -H "Accept: application/json" \
            "$GITEA_SERVER_URL/api/v1/repos/Slipstream/auto_review/pulls?state=open" \
            | jq -c '\''[.[] | {index: .number, head: .head.ref}]'\'' > "$OPEN_PRS_JSON"'
          nix develop --command bash -c 'set -euo pipefail
            open_prs="$(<"$OPEN_PRS_JSON")"
            superseded_prs="$(printf "%s\n" "$open_prs" | jq -r --arg branch "$RELEASE_BRANCH" --arg prefix "release/v" ".[] | select(.head | startswith(\$prefix)) | select(.head != \$branch) | .index")"
            for superseded_pr in $superseded_prs; do
              tea pr close --login "$TEA_LOGIN" --repo Slipstream/auto_review "$superseded_pr"
            done
            existing_pr="$(printf "%s\n" "$open_prs" | jq -r --arg branch "$RELEASE_BRANCH" ".[] | select(.head == \$branch) | .index" | head -n 1)"
            if [ -z "$existing_pr" ]; then
              tea pr create --login "$TEA_LOGIN" --repo Slipstream/auto_review --head "$RELEASE_BRANCH" --base main --title "chore: release v$RELEASE_VERSION" --description "Prepare release v$RELEASE_VERSION from branch $RELEASE_BRANCH using scripts/release prepare. This version bump updates Cargo.toml, Cargo.lock, and CHANGELOG.md with semver-selected release metadata before merge to main."
            else
              printf "release PR already open: #%s\n" "$existing_pr"
              tea pr edit --login "$TEA_LOGIN" --repo Slipstream/auto_review "$existing_pr" --description "Prepare release v$RELEASE_VERSION from branch $RELEASE_BRANCH using scripts/release prepare. This version bump updates Cargo.toml, Cargo.lock, and CHANGELOG.md with semver-selected release metadata before merge to main."
            fi'
