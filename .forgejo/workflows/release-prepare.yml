name: Prepare release PR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true
      date:
        description: Release date in YYYY-MM-DD format
        required: true

jobs:
  release-prepare:
    runs-on: docker
    steps:
      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ ! -x "$NIX_BIN_DIR/nix" ]; then
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate release inputs
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_DATE: ${{ inputs.date }}
        run: |
          set -euo pipefail
          version="${RELEASE_VERSION:-$(python3 -c 'import pathlib,re; m=re.search(r"(?m)^version\s*=\s*\"(?P<version>[^\"]+)\"", pathlib.Path("Cargo.toml").read_text()); major,minor,patch=(int(part) for part in m.group("version").split(".")); print("0.1.0" if (major, minor, patch) == (0, 0, 1) else f"{major}.{minor}.{patch + 1}")')}"
          date="${RELEASE_DATE:-$(date +%F)}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
      - name: Prepare release branch
        env:
          FORGEJO_RELEASE_PREPARE_TOKEN: ${{ secrets.FORGEJO_RELEASE_PREPARE_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_DATE: ${{ inputs.date }}
        run: |
          set -euo pipefail
          repo_token="${FORGEJO_RELEASE_PREPARE_TOKEN:-}"
          if [ -z "$repo_token" ]; then
            printf 'missing FORGEJO_RELEASE_PREPARE_TOKEN\n' >&2
            exit 1
          fi
          export GITEA_SERVER_TOKEN="$repo_token"
          export FORGEJO_ACTIONS_TOKEN="$repo_token"
          export GITEA_SERVER_URL="${FORGEJO_SERVER_URL:-${GITHUB_SERVER_URL:-https://git.johnwilger.com}}"
          version="${RELEASE_VERSION:-$(python3 -c 'import pathlib,re; m=re.search(r"(?m)^version\s*=\s*\"(?P<version>[^\"]+)\"", pathlib.Path("Cargo.toml").read_text()); major,minor,patch=(int(part) for part in m.group("version").split(".")); print("0.1.0" if (major, minor, patch) == (0, 0, 1) else f"{major}.{minor}.{patch + 1}")')}"
          date="${RELEASE_DATE:-$(date +%F)}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]
          branch="release/v${version}"
          git config user.name "auto_review release automation"
          git config user.email "auto_review@git.johnwilger.com"
          git fetch origin main "$branch" || git fetch origin main
          git switch -C "$branch" origin/main
          nix develop --command scripts/release prepare --workspace . --version "$version" --date "$date"
          git add Cargo.toml CHANGELOG.md
          if git diff --cached --quiet; then
            git commit --allow-empty -m "chore(release): prepare v${version}"
          else
            git commit -m "chore(release): prepare v${version}"
          fi
          # The branch update remains a force-with-lease push:
          # git push --force-with-lease origin "$branch"
          git -c credential.helper='!f() { printf "username=release\npassword=%s\n" "$FORGEJO_ACTIONS_TOKEN"; }; f' push --force-with-lease origin "$branch"
          pr_index="$(nix develop --command tea pr list --repo jwilger/auto_review --state open --fields index,head --output csv | awk -F, -v branch="$branch" '$2 == branch { print $1; exit }')"
          if [ -n "$pr_index" ]; then
            nix develop --command tea pr edit --repo jwilger/auto_review "$pr_index" --title "chore(release): prepare v${version}" --description "Prepare release v${version}."
          else
            nix develop --command tea pr create --repo jwilger/auto_review --head "$branch" --base main --title "chore(release): prepare v${version}" --description "Prepare release v${version}."
          fi
