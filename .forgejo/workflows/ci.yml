name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  fmt:
    name: Format check
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Idempotent Nix install: when the runner host mounts `/nix`
      # as a persistent volume (see docs/DEPLOYMENT.md#forgejo-runner-nix-cache),
      # subsequent runs find Nix already present and skip the
      # installer. First run on a fresh volume installs from the
      # upstream determinate.systems script; the volume retains
      # the entire /nix/store across jobs so repeated cargo + crane
      # work can hit cache across runs.
      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          # The persistent /nix volume retains the store and nix
          # binary across runs, but each runner container is fresh
          # so /etc/{group,passwd} have been wiped — including the
          # `nixbld` build group/users that nix.conf references via
          # `build-users-group = nixbld`. Without these, Nix-backed
          # commands exit with "the group 'nixbld' ... does not exist".
          # Recreate idempotently.
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          # GITHUB_PATH (honored by Forgejo Actions) makes the PATH
          # change durable across steps.
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just fmt
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just fmt

  clippy:
    name: Clippy
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just clippy
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just clippy

  test:
    name: Test
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just test
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just test

  deny:
    name: Dependency policy
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just deny
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just deny

  build:
    name: Build
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just build
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just build

  semantic-review:
    name: Request auto_review semantic review
    runs-on: ubuntu-24.04
    needs: [fmt, clippy, test, deny, build]
    if: ${{ github.event_name == 'pull_request' }}
    env:
      AUTO_REVIEW_GATEWAY_URL: ${{ secrets.AUTO_REVIEW_GATEWAY_URL }}
      AUTO_REVIEW_ACTION_TOKEN: ${{ secrets.AUTO_REVIEW_ACTION_TOKEN }}
    steps:
      - name: Skip when auto_review secrets are not configured
        if: ${{ env.AUTO_REVIEW_GATEWAY_URL == '' || env.AUTO_REVIEW_ACTION_TOKEN == '' || env.AUTO_REVIEW_GATEWAY_URL == github.server_url }}
        run: |
          echo "auto_review semantic review skipped: AUTO_REVIEW_GATEWAY_URL must point at ar-gateway, AUTO_REVIEW_ACTION_TOKEN must be configured, and the gateway URL must not be the Forgejo server URL"

      - name: Request auto_review review
        continue-on-error: true
        if: ${{ env.AUTO_REVIEW_GATEWAY_URL != '' && env.AUTO_REVIEW_ACTION_TOKEN != '' && env.AUTO_REVIEW_GATEWAY_URL != github.server_url }}
        run: |
          set -euo pipefail
          json_payload='{"owner":"${{ github.repository_owner }}","repo":"${{ github.event.repository.name }}","pr_number":${{ github.event.pull_request.number }},"head_sha":"${{ github.event.pull_request.head.sha }}"}'
          curl -fsS --connect-timeout 5 --max-time 30 -X POST \
            -H "Authorization: Bearer $AUTO_REVIEW_ACTION_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$json_payload" \
            "${AUTO_REVIEW_GATEWAY_URL%/}/reviews/ci"

  pr-artifact-build:
    name: Build PR artifacts (no token)
    runs-on: docker-release
    needs: [fmt, clippy, test, deny, build]
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Skip non-release PR artifact build
        if: "${{ !(startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v')) }}"
        run: |
          printf 'Skipping release PR artifact build for ordinary non-release PR.\n'

      - uses: actions/checkout@v4
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install or reuse Nix
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Build release PR Docker image and binary package
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/containers" pr-artifacts pr-publication-artifacts
          cat > "$HOME/.config/containers/policy.json" <<'EOF'
          {"default":[{"type":"insecureAcceptAnything"}]}
          EOF
          RELEASE_VERSION="$(python3 - <<'PY'
          import pathlib
          import re

          match = re.search(r'(?m)^version\s*=\s*"(?P<version>[^"]+)"', pathlib.Path("Cargo.toml").read_text())
          if not match:
              raise SystemExit("workspace package version not found in Cargo.toml")
          print(match.group("version"))
          PY
          )"
          nix develop --command nix build .#ar-gateway-image
          cp -L result pr-publication-artifacts/ar-gateway-image.tar
          x86_release_root="$(nix build .#packages.x86_64-linux.ar-cli-portable-release-root --print-out-paths --no-link)"
          tar -C "$x86_release_root" -czf "pr-artifacts/auto-review-pr-$PR_NUMBER-$PR_HEAD_SHA-linux-x86_64.tar.gz" auto-review bin nix
          (cd pr-artifacts && sha256sum "auto-review-pr-$PR_NUMBER-$PR_HEAD_SHA-linux-x86_64.tar.gz" > SHA256SUMS)
          cp pr-artifacts/auto-review-pr-$PR_NUMBER-$PR_HEAD_SHA-linux-x86_64.tar.gz pr-publication-artifacts/
          cp pr-artifacts/SHA256SUMS pr-publication-artifacts/
          printf 'PR_NUMBER=%s\nPR_HEAD_SHA=%s\nRELEASE_VERSION=%s\n' "$PR_NUMBER" "$PR_HEAD_SHA" "$RELEASE_VERSION" > pr-publication-artifacts/pr-metadata.env

      - uses: actions/upload-artifact@v3
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        with:
          name: pr-publication-artifacts
          path: pr-publication-artifacts

  pr-packages:
    name: Publish PR artifact packages
    runs-on: ubuntu-24.04
    needs: pr-artifact-build
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Skip non-release PR artifact publication
        if: "${{ !(startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v')) }}"
        run: |
          printf 'Skipping release PR artifact publication for ordinary non-release PR.\n'

      - uses: actions/download-artifact@v3
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        with:
          name: pr-publication-artifacts
          path: pr-publication-artifacts

      - name: Install or reuse Nix (nix-installer)
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          PATH="$NIX_BIN_DIR:$PATH" nix profile install \
            nixpkgs#skopeo \
            nixpkgs#jq \
            nixpkgs#curl \
            nixpkgs#coreutils \
            nixpkgs#gawk \
            nixpkgs#gnused
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Resolve trusted PR package tools
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        run: |
          set -euo pipefail
          SKOPEO=/nix/var/nix/profiles/default/bin/skopeo
          JQ=/nix/var/nix/profiles/default/bin/jq
          CURL=/nix/var/nix/profiles/default/bin/curl
          MKTEMP=/nix/var/nix/profiles/default/bin/mktemp
          CAT=/nix/var/nix/profiles/default/bin/cat
          AWK=/nix/var/nix/profiles/default/bin/awk
          SED=/nix/var/nix/profiles/default/bin/sed
          MKDIR=/nix/var/nix/profiles/default/bin/mkdir
          [ -x "$SKOPEO" ]
          [ -x "$JQ" ]
          [ -x "$CURL" ]
          [ -x "$MKTEMP" ]
          [ -x "$CAT" ]
          [ -x "$AWK" ]
          [ -x "$SED" ]
          [ -x "$MKDIR" ]
          printf 'SKOPEO=%s\n' "$SKOPEO" >> "$GITHUB_ENV"
          printf 'JQ=%s\n' "$JQ" >> "$GITHUB_ENV"
          printf 'CURL=%s\n' "$CURL" >> "$GITHUB_ENV"
          printf 'MKTEMP=%s\n' "$MKTEMP" >> "$GITHUB_ENV"
          printf 'CAT=%s\n' "$CAT" >> "$GITHUB_ENV"
          printf 'AWK=%s\n' "$AWK" >> "$GITHUB_ENV"
          printf 'SED=%s\n' "$SED" >> "$GITHUB_ENV"
          printf 'MKDIR=%s\n' "$MKDIR" >> "$GITHUB_ENV"

      - name: Publish release PR Docker image and generic binary package
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        env:
          RELEASE_PUBLISH_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN }}
          RELEASE_BOT_NAME: ${{ vars.RELEASE_BOT_NAME }}
        run: |
          set -euo pipefail
          unset BASH_ENV ENV LD_PRELOAD LD_LIBRARY_PATH DYLD_INSERT_LIBRARIES PYTHONPATH PERL5LIB RUBYLIB NODE_OPTIONS
          PR_HEAD_SHA=""
          RELEASE_VERSION=""
          while IFS='=' read -r key value; do
            case "$key" in
              PR_NUMBER) PR_NUMBER="$value" ;;
              PR_HEAD_SHA) PR_HEAD_SHA="$value" ;;
              RELEASE_VERSION) RELEASE_VERSION="$value" ;;
            esac
          done < pr-publication-artifacts/pr-metadata.env
          if [ -z "$RELEASE_VERSION" ]; then
            printf 'release PR artifact metadata did not include RELEASE_VERSION\n' >&2
            exit 1
          fi
          if [[ ! "$PR_HEAD_SHA" =~ ^[0-9a-fA-F]{40}$ ]] || [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || [[ ! "${GITHUB_RUN_NUMBER:-}" =~ ^[0-9]+$ ]]; then
            printf 'invalid release PR image tag metadata\n' >&2
            exit 1
          fi
          if [ -z "${RELEASE_PUBLISH_TOKEN:-}" ] || [ -z "${RELEASE_BOT_NAME:-}" ]; then
            printf 'missing RELEASE_PUBLISH_TOKEN or RELEASE_BOT_NAME for PR package publication\n' >&2
            exit 1
          fi
          "$MKDIR" -p "$HOME/.config/containers"
          "$CAT" > "$HOME/.config/containers/policy.json" <<'EOF'
          {"default":[{"type":"insecureAcceptAnything"}]}
          EOF
          sha_tag="git.johnwilger.com/jwilger/auto_review/ar-gateway:$PR_HEAD_SHA"
          rc_tag="git.johnwilger.com/jwilger/auto_review/ar-gateway:release-candidate"
          "$SKOPEO" copy --dest-creds "${RELEASE_BOT_NAME}:$RELEASE_PUBLISH_TOKEN" docker-archive:pr-publication-artifacts/ar-gateway-image.tar "docker://$sha_tag"
          image_digest="$($SKOPEO inspect --creds "${RELEASE_BOT_NAME}:$RELEASE_PUBLISH_TOKEN" "docker://$sha_tag" | "$JQ" -r '.Digest')"
          if [[ ! "$image_digest" =~ ^sha256:[0-9a-fA-F]{64}$ ]]; then
            printf 'release PR image digest was not sha256-shaped: %s\n' "$image_digest" >&2
            exit 1
          fi
          "$SKOPEO" copy --src-creds "${RELEASE_BOT_NAME}:$RELEASE_PUBLISH_TOKEN" --dest-creds "${RELEASE_BOT_NAME}:$RELEASE_PUBLISH_TOKEN" "docker://git.johnwilger.com/jwilger/auto_review/ar-gateway@$image_digest" "docker://$rc_tag"
          printf 'SHA_TAG=%s\nRC_TAG=%s\nIMAGE_DIGEST=%s\n' "$sha_tag" "$rc_tag" "$image_digest" > pr-publication-artifacts/pr-image.env
          for artifact in "auto-review-pr-$PR_NUMBER-$PR_HEAD_SHA-linux-x86_64.tar.gz" SHA256SUMS; do
            "$CURL" -fsS -X PUT \
              -u "${RELEASE_BOT_NAME}:$RELEASE_PUBLISH_TOKEN" \
              --upload-file "pr-publication-artifacts/$artifact" \
              "https://git.johnwilger.com/api/packages/jwilger/generic/auto-review-pr/$PR_NUMBER-$PR_HEAD_SHA/$artifact"
            "$CURL" -fsS -X PUT \
              -u "${RELEASE_BOT_NAME}:$RELEASE_PUBLISH_TOKEN" \
              --upload-file "pr-publication-artifacts/$artifact" \
              "https://git.johnwilger.com/api/packages/jwilger/generic/auto-review-release-candidate/release-candidate/$artifact"
          done
