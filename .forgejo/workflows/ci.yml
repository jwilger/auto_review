name: CI

# Only PRs trigger CI: main is branch-protected and requires a PR,
# so any merge has already passed CI on the PR. Re-running on push
# to main would be redundant and burn cache cycles for no signal.
on:
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: Nix flake check
    # `docker` is a confirmed-registered label on this Forgejo
    # instance: commits with `runs-on: docker` create tasks (the
    # b216906 attempt produced run #97). The earlier
    # `ubuntu-latest` label did not register at all (commit
    # 6e11c18 produced zero tasks).
    runs-on: docker
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Idempotent Nix install: when the runner host mounts `/nix`
      # as a persistent volume (see deploy/forgejo-runner/README.md),
      # subsequent runs find Nix already present and skip the
      # installer. First run on a fresh volume installs from the
      # upstream determinate.systems script; the volume retains
      # the entire /nix/store across jobs so `nix flake check`
      # hits cache for everything cargo + crane built last time.
      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          # The persistent /nix volume retains the store and nix
          # binary across runs, but each runner container is fresh
          # so /etc/{group,passwd} have been wiped — including the
          # `nixbld` build group/users that nix.conf references via
          # `build-users-group = nixbld`. Without these, `nix flake
          # check` exits 2s in with "the group 'nixbld' ... does not
          # exist". Recreate idempotently.
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          # GITHUB_PATH (honored by Forgejo Actions) makes the PATH
          # change durable across steps.
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run all checks (fmt, clippy, nextest, deny)
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix flake check --print-build-logs

  semantic-review:
    name: auto_review semantic review
    runs-on: docker
    needs: flake-check
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Request auto_review review
        uses: https://git.johnwilger.com/jwilger/auto_review/deploy/forgejo-action@main
        with:
          gateway-url: ${{ secrets.AUTO_REVIEW_GATEWAY_URL }}
          action-token: ${{ secrets.AUTO_REVIEW_ACTION_TOKEN }}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          pr-number: ${{ github.event.pull_request.number }}
          head-sha: ${{ github.event.pull_request.head.sha }}
