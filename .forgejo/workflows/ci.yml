name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  path-classification:
    name: Classify changed paths
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      app_ci: ${{ steps.changed-paths.outputs.app_ci }}
      opencode_ci: ${{ steps.changed-paths.outputs.opencode_ci }}
    steps:
      - name: Detect changed paths
        id: changed-paths
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          owner="${{ github.repository_owner }}"
          repo="${{ github.event.repository.name }}"
          pr_number="${{ github.event.pull_request.number }}"
          files_url="${{ github.server_url }}/api/v1/repos/$owner/$repo/pulls/$pr_number/files"

          files_json="$({
            curl -fsS --connect-timeout 5 --max-time 30 \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -H "Accept: application/json" \
              "$files_url"
          } || true)"

          if [ -z "$files_json" ]; then
            echo "path classification failed to fetch changed files; running all CI gates" >&2
            app_ci="true"
            opencode_ci="true"
          else
            changed_files="$(printf '%s' "$files_json" | python3 -c 'import json,sys; print("\n".join(item.get("filename", "") for item in json.load(sys.stdin)))')"

            app_ci="true"
            opencode_ci="false"

            while IFS= read -r file; do
              case "$file" in
                .opencode/*|opencode.json)
                  opencode_ci="true"
                  app_ci="false"
                  ;;
                *)
                  app_ci="true"
                  ;;
              esac
            done <<< "$changed_files"
          fi

          echo "app_ci=$app_ci" >> "$GITHUB_OUTPUT"
          echo "opencode_ci=$opencode_ci" >> "$GITHUB_OUTPUT"

  fmt:
    name: Format check
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && needs.path-classification.outputs.app_ci == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [path-classification]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Idempotent Nix install: when the runner host mounts `/nix`
      # as a persistent volume (see docs/DEPLOYMENT.md#forgejo-runner-nix-cache),
      # subsequent runs find Nix already present and skip the
      # installer. First run on a fresh volume installs from the
      # upstream determinate.systems script; the volume retains
      # the entire /nix/store across jobs so repeated cargo + crane
      # work can hit cache across runs.
      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          # The persistent /nix volume retains the store and nix
          # binary across runs, but each runner container is fresh
          # so /etc/{group,passwd} have been wiped — including the
          # `nixbld` build group/users that nix.conf references via
          # `build-users-group = nixbld`. Without these, Nix-backed
          # commands exit with "the group 'nixbld' ... does not exist".
          # Recreate idempotently.
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          # GITHUB_PATH (honored by Forgejo Actions) makes the PATH
          # change durable across steps.
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just fmt
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just fmt

  clippy:
    name: Clippy
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && needs.path-classification.outputs.app_ci == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [path-classification]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just clippy
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just clippy

  test:
    name: Test
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && needs.path-classification.outputs.app_ci == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [path-classification]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just test
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just test

  opencode-test:
    name: opencode plugin tests
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && needs.path-classification.outputs.opencode_ci == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [path-classification]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just opencode-test
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just opencode-test

  deny:
    name: Dependency policy
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && needs.path-classification.outputs.app_ci == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [path-classification]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just deny
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just deny

  build:
    name: Build
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && needs.path-classification.outputs.app_ci == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [path-classification]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run just build
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just build

  semantic-review:
    name: Request auto_review semantic review
    runs-on: ubuntu-24.04
    needs: [path-classification]
    if: ${{ github.event_name == 'pull_request' }}
    env:
      AUTO_REVIEW_GATEWAY_URL: ${{ vars.AUTO_REVIEW_GATEWAY_URL }}
      AR_CI_REVIEW_TOKEN: ${{ secrets.AR_CI_REVIEW_TOKEN }}
    steps:
      - name: Skip when auto_review configuration is not available
        if: ${{ env.AUTO_REVIEW_GATEWAY_URL == '' || env.AR_CI_REVIEW_TOKEN == '' || env.AUTO_REVIEW_GATEWAY_URL == github.server_url }}
        run: |
          echo "auto_review semantic review skipped: repository variable AUTO_REVIEW_GATEWAY_URL must point at ar-gateway, secret AR_CI_REVIEW_TOKEN must match the gateway AR_CI_REVIEW_TOKEN, and the gateway URL must not be the Forgejo server URL"

      - name: Request auto_review review
        continue-on-error: true
        if: ${{ env.AUTO_REVIEW_GATEWAY_URL != '' && env.AR_CI_REVIEW_TOKEN != '' && env.AUTO_REVIEW_GATEWAY_URL != github.server_url }}
        run: |
          set -euo pipefail
          json_payload='{"owner":"${{ github.repository_owner }}","repo":"${{ github.event.repository.name }}","pr_number":${{ github.event.pull_request.number }},"head_sha":"${{ github.event.pull_request.head.sha }}"}'
          response_file="$(mktemp)"
          status="$(curl -sS --connect-timeout 5 --max-time 30 -o "$response_file" -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $AR_CI_REVIEW_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$json_payload" \
            "${AUTO_REVIEW_GATEWAY_URL%/}/reviews/ci")"

          if [ "$status" -eq 401 ] || [ "$status" -eq 403 ]; then
            echo "auto_review semantic review authorization failed with HTTP $status; verify the Slipstream/auto_review AR_CI_REVIEW_TOKEN secret matches production AR_CI_REVIEW_TOKEN" >&2
            exit 1
          fi

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "auto_review semantic review request failed with HTTP $status" >&2
            cat "$response_file" >&2
            exit 1
          fi

  pr-artifact-build:
    name: Build PR artifacts (no token)
    runs-on: docker-release
    needs: [fmt, clippy, test, opencode-test, deny, build]
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Skip non-release PR artifact build
        if: "${{ !(startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v')) }}"
        run: |
          printf 'Skipping release PR artifact build for ordinary non-release PR.\n'

      - uses: actions/checkout@v4
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install or reuse Nix
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"

      - name: Build release PR binary artifact
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        run: |
          set -euo pipefail
          mkdir -p pr-artifacts
          x86_release_root="$(nix build .#packages.x86_64-linux.ar-cli-portable-release-root --print-out-paths --no-link)"
          tar -C "$x86_release_root" -czf "pr-artifacts/auto-review-pr-$PR_NUMBER-$PR_HEAD_SHA-linux-x86_64.tar.gz" auto-review bin nix
          (cd pr-artifacts && sha256sum "auto-review-pr-$PR_NUMBER-$PR_HEAD_SHA-linux-x86_64.tar.gz" > SHA256SUMS)

      - uses: actions/upload-artifact@v3
        if: "${{ startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.title, 'chore: release v') }}"
        with:
          name: pr-release-artifacts
          path: pr-artifacts
