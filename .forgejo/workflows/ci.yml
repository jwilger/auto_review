name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: Nix flake check
    runs-on: docker
    container:
      # Pinned digest of nixos/nix:2.34.6 — ships nix with flakes
      # disabled-by-default, hence the `--extra-experimental-features`
      # below. CI must use the exact toolchain pinned in
      # rust-toolchain.toml; that's the whole point of the flake.
      image: docker.io/nixos/nix:2.34.6
    steps:
      - uses: actions/checkout@v4

      - name: Trust the workspace's flake
        # Forgejo's runner doesn't pre-trust the working tree;
        # the experimental-features flag tells nix to allow flakes
        # for this invocation only.
        run: |
          mkdir -p /etc/nix
          cat >> /etc/nix/nix.conf <<EOF
          experimental-features = nix-command flakes
          accept-flake-config = true
          # Larger /nix/store budget so cargo's target dir doesn't
          # blow up the default 1 GiB tmpfs.
          max-jobs = auto
          EOF

      - name: Run all checks (fmt, clippy, nextest, deny)
        run: nix flake check --print-build-logs
