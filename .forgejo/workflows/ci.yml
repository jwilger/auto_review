name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: Nix flake check
    # `docker` is a confirmed-registered label on this Forgejo
    # instance: commits with `runs-on: docker` create tasks (the
    # b216906 attempt produced run #97). The earlier
    # `ubuntu-latest` label did not register at all (commit
    # 6e11c18 produced zero tasks).
    runs-on: docker
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Install Nix via the upstream installer script rather than
      # a third-party action (no assumption about which GitHub
      # Marketplace actions this Forgejo runner can fetch). The
      # determinate.systems script is the canonical multi-arch
      # installer; --no-confirm skips the interactive prompt.
      # `extra-conf` flips on flakes + nix-command for this host.
      - name: Install Nix
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf -L \
            https://install.determinate.systems/nix \
            | sh -s -- install linux \
              --init none \
              --no-confirm \
              --extra-conf "experimental-features = nix-command flakes" \
              --extra-conf "accept-flake-config = true"
          # The installer drops binaries under /nix/var/nix/profiles/
          # default/bin which isn't on PATH for the next step. The
          # standard /etc/profile.d/nix.sh sets it up; source it.
          # GITHUB_PATH (also honored by Forgejo Actions) makes the
          # change durable across steps.
          echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"

      - name: Run all checks (fmt, clippy, nextest, deny)
        run: nix flake check --print-build-logs
