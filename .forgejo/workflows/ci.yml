name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    name: Nix flake check
    # `ubuntu-latest` is the label this Forgejo runner advertises;
    # the previous `docker` label didn't match any registered runner
    # and stalled at "Set up job".
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Install Nix on the standard runner image. The Determinate
      # Systems installer is the de-facto standard for CI Nix
      # installs — fast, deterministic, supports flakes out of the
      # box. Pinned commit SHA so a future tag move can't change
      # the installer mid-flight.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@92148bb48b9a0c5458c53dd0b368fbfbfbaa3210
        with:
          determinate: false

      # Magic-nix-cache: warms /nix/store from a pull-through cache
      # so we don't rebuild rustc + crane + dep layer from scratch
      # on every run. Pinned SHA. `use-flakehub: false` keeps us on
      # the public store cache rather than the FlakeHub one.
      - name: Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@b4a9864e3a8ab8179be30f2e70fd71fe9996bb9d
        with:
          use-flakehub: false

      - name: Run all checks (fmt, clippy, nextest, deny)
        run: nix flake check --print-build-logs
