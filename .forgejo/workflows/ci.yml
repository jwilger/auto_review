name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: docker
    container:
      image: rust:1.85-slim-bookworm
    steps:
      - uses: actions/checkout@v4
      - name: install components
        run: rustup component add rustfmt clippy
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace --all-targets

  supply-chain:
    runs-on: docker
    container:
      image: rust:1.85-slim-bookworm
    steps:
      - uses: actions/checkout@v4
      # `cargo install` builds from source which is slow but
      # reliable across architectures. Pinning the version
      # keeps the supply-chain check itself reproducible.
      - name: install cargo-deny
        run: cargo install --locked cargo-deny@0.16.4
      - name: cargo deny check
        run: cargo deny check
