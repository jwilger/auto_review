name: Publish release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_merge_sha:
        required: true
        type: string

jobs:
  release-publish:
    runs-on: docker
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' && inputs.release_merge_sha != '' }}
    environment: release-publish
    steps:
      - name: Install or reuse Nix
        run: |
          set -euo pipefail
          NIX_BIN_DIR="/nix/var/nix/profiles/default/bin"
          if [ -x "$NIX_BIN_DIR/nix" ]; then
            echo "Nix already present at $NIX_BIN_DIR (volume cache hit)"
          else
            echo "Installing Nix (cold start or fresh volume)"
            curl --proto '=https' --tlsv1.2 -sSf -L \
              https://install.determinate.systems/nix \
              | sh -s -- install linux \
                --init none \
                --no-confirm \
                --extra-conf "experimental-features = nix-command flakes" \
                --extra-conf "accept-flake-config = true"
          fi
          if ! getent group nixbld > /dev/null; then
            groupadd -r nixbld
          fi
          for i in $(seq 1 32); do
            if ! id -u "nixbld$i" > /dev/null 2>&1; then
              useradd -r -g nixbld -G nixbld -d /var/empty \
                -s /usr/sbin/nologin -c "Nix build user $i" "nixbld$i"
            fi
          done
          echo "$NIX_BIN_DIR" >> "$GITHUB_PATH"
      - uses: actions/checkout@v4
        name: Checkout pushed main commit
        if: ${{ github.event_name == 'push' }}
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/checkout@v4
        name: Checkout dispatched release merge commit
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          ref: ${{ inputs.release_merge_sha }}
          persist-credentials: false
          fetch-depth: 0
      - name: Export pushed release context
        if: ${{ github.event_name == 'push' }}
        env:
          RELEASE_BASE_SHA: ${{ github.event.before }}
          RELEASE_MERGE_SHA: ${{ github.sha }}
          RELEASE_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          printf 'RELEASE_BASE_SHA=%s\n' "$RELEASE_BASE_SHA" >> "$GITHUB_ENV"
          printf 'RELEASE_MERGE_SHA=%s\n' "$RELEASE_MERGE_SHA" >> "$GITHUB_ENV"
      - name: Export dispatched release context
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_MERGE_SHA: ${{ inputs.release_merge_sha }}
        run: |
          set -euo pipefail
          printf 'RELEASE_BASE_SHA=\n' >> "$GITHUB_ENV"
          printf 'RELEASE_MERGE_SHA=%s\n' "$RELEASE_MERGE_SHA" >> "$GITHUB_ENV"
      - name: Decide whether pushed commit should publish release
        id: release-decision
        env:
          RELEASE_BASE_SHA: ${{ github.event.before }}
          RELEASE_MERGE_SHA: ${{ github.sha }}
          RELEASE_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          should_publish_release=false
          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            should_publish_release=true
          elif [ "${GITHUB_EVENT_NAME:-}" = "push" ]; then
            changed_files="$(git diff --name-only "$RELEASE_BASE_SHA" "$RELEASE_MERGE_SHA")"
            if [ -n "$changed_files" ]; then
              should_publish_release=true
              saw_release_metadata=false
              while IFS= read -r changed_file; do
                if [ "$changed_file" = Cargo.toml ] || [ "$changed_file" = Cargo.lock ] || [ "$changed_file" = CHANGELOG.md ]; then
                  saw_release_metadata=true
                else
                  should_publish_release=false
                fi
              done <<EOF
          $changed_files
          EOF
              if [ "$saw_release_metadata" != true ]; then
                should_publish_release=false
              fi
              if [[ "$RELEASE_COMMIT_MESSAGE" == "chore: release v"* ]]; then
                :
              else
                should_publish_release=false
              fi
            fi
          fi
          if [ "$should_publish_release" != true ]; then
            printf 'not a release commit; skip token-bearing publication steps\n'
          fi
          printf 'should_publish_release=%s\n' "$should_publish_release" >> "$GITHUB_OUTPUT"
          printf 'SHOULD_PUBLISH_RELEASE=%s\n' "$should_publish_release" >> "$GITHUB_ENV"
      - name: Validate release provenance and changed files
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_BASE_SHA" ]]; then
            RELEASE_BASE_SHA="$RELEASE_MERGE_SHA^1"
          fi
          [[ "$(git rev-parse HEAD)" == "$RELEASE_MERGE_SHA" ]]
          git merge-base --is-ancestor "$RELEASE_MERGE_SHA" origin/main
          git diff --name-only "$RELEASE_BASE_SHA" "$RELEASE_MERGE_SHA" | while IFS= read -r changed_file; do
            case "$changed_file" in
              Cargo.toml|Cargo.lock|CHANGELOG.md)
                ;;
              .forgejo/workflows/release-prepare.yml|.forgejo/workflows/release-publish.yml|scripts/release|tests/release_tooling_test.sh|tests/release_tooling/*.sh)
                ;;
              .forgejo/workflows/*|scripts/*)
                printf 'refusing token-bearing publish for release PR file: %s\n' "$changed_file" >&2
                exit 1
                ;;
              *)
                printf 'refusing token-bearing publish for release PR file: %s\n' "$changed_file" >&2
                exit 1
                ;;
            esac
          done
      - name: Attach merge commit to main
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          git switch -C main "$RELEASE_MERGE_SHA"
          git branch --set-upstream-to=origin/main main
      - name: Derive release version from checked-out metadata
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          # RELEASE_VERSION=Cargo.toml checked-out metadata.
          RELEASE_VERSION="$(python3 - <<'PY'
          import pathlib
          import re

          match = re.search(r'(?m)^version\s*=\s*"(?P<version>[^"]+)"', pathlib.Path("Cargo.toml").read_text())
          if not match:
              raise SystemExit("workspace package version not found in Cargo.toml")
          print(match.group("version"))
          PY
          )"
          printf 'RELEASE_VERSION=%s\n' "$RELEASE_VERSION" >> "$GITHUB_ENV"
      - name: Build and verify Linux binary release artifacts
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        env:
          RELEASE_BOT_EMAIL: ${{ vars.RELEASE_BOT_EMAIL }}
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_SIGNING_KEY:-}" ]; then
            printf 'missing RELEASE_SIGNING_KEY\n' >&2
            exit 1
          fi
          if [ -z "${RELEASE_BOT_EMAIL:-}" ]; then
            printf 'missing RELEASE_BOT_EMAIL repository variable\n' >&2
            exit 1
          fi
          umask 077
          signing_dir="$(mktemp -d)"
          trap 'rm -rf "$signing_dir"' EXIT TERM INT
          signing_key="$signing_dir/release-signing-key"
          printf '%s\n' "$RELEASE_SIGNING_KEY" > "$signing_key"
          chmod 600 "$signing_key"
          mkdir -p release-artifacts
          x86_release_root="$(nix build .#packages.x86_64-linux.ar-cli-portable-release-root --print-out-paths --no-link)"
          tar -C "$x86_release_root" -czf release-artifacts/auto-review-$RELEASE_VERSION-linux-x86_64.tar.gz auto-review bin nix
          (
            cd release-artifacts
            sha256sum auto-review-$RELEASE_VERSION-linux-x86_64.tar.gz > SHA256SUMS
            python3 - "$RELEASE_VERSION" "$RELEASE_MERGE_SHA" "$x86_release_root" <<'PY'
          import datetime
          import hashlib
          import json
          import pathlib
          import sys

          version, source, x86_out = sys.argv[1:]
          generated_at = datetime.datetime.now(datetime.UTC).replace(microsecond=0).isoformat()
          archives = [
              ("linux-x86_64", f"auto-review-{version}-linux-x86_64.tar.gz", x86_out),
          ]

          def file_digest(path, algorithm):
              digest = hashlib.new(algorithm)
              with pathlib.Path(path).open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()

          def sha256(path):
              return file_digest(path, "sha256")

          def sha1(path):
              return file_digest(path, "sha1")

          def package_verification_code(file_sha1s):
              joined = "".join(sorted(file_sha1s))
              return hashlib.sha1(joined.encode("utf-8")).hexdigest()

          files = [
              {
                  "SPDXID": f"SPDXRef-File-auto-review-{target.replace('_', '-')}",
                  "fileName": archive,
                  "checksums": [
                      {"algorithm": "SHA1", "checksumValue": sha1(archive)},
                      {"algorithm": "SHA256", "checksumValue": sha256(archive)},
                  ],
                  "licenseConcluded": "NOASSERTION",
                  "licenseInfoInFiles": ["NOASSERTION"],
                  "copyrightText": "NOASSERTION",
                  "artifactOf": [{"name": "auto-review", "versionInfo": version}],
              }
              for target, archive, _ in archives
          ]
          file_sha1s = [next(checksum["checksumValue"] for checksum in item["checksums"] if checksum["algorithm"] == "SHA1") for item in files]
          sbom = {
              "spdxVersion": "SPDX-2.3",
              "dataLicense": "CC0-1.0",
              "SPDXID": "SPDXRef-DOCUMENT",
              "name": f"auto-review-{version}-binary-release",
              "documentNamespace": f"https://git.johnwilger.com/jwilger/auto_review/releases/v{version}/sbom",
              "creationInfo": {
                  "created": generated_at,
                  "creators": ["Tool: auto_review-release-workflow", "Organization: jwilger/auto_review"],
              },
              "packages": [
                  {
                      "SPDXID": "SPDXRef-Package-auto-review",
                      "name": "auto-review",
                      "versionInfo": version,
                      "downloadLocation": f"https://git.johnwilger.com/jwilger/auto_review/releases/tag/v{version}",
                      "filesAnalyzed": True,
                      "packageVerificationCode": {"packageVerificationCodeValue": package_verification_code(file_sha1s)},
                      "licenseConcluded": "NOASSERTION",
                      "licenseDeclared": "NOASSERTION",
                      "copyrightText": "NOASSERTION",
                  }
              ],
              "files": files,
              "relationships": [
                  {"spdxElementId": "SPDXRef-DOCUMENT", "relationshipType": "DESCRIBES", "relatedSpdxElement": "SPDXRef-Package-auto-review"},
                  *[
                      {"spdxElementId": "SPDXRef-Package-auto-review", "relationshipType": "CONTAINS", "relatedSpdxElement": item["SPDXID"]}
                      for item in files
                  ],
              ],
          }
          pathlib.Path(f"auto-review-{version}-sbom.spdx.json").write_text(json.dumps(sbom, indent=2, sort_keys=True) + "\n")

          provenance = {
              "_type": "https://in-toto.io/Statement/v1",
              "subject": [
                  {"name": archive, "digest": {"sha256": sha256(archive)}}
                  for _, archive, _ in archives
              ],
              "predicateType": "https://slsa.dev/provenance/v1",
              "predicate": {
                  "buildDefinition": {
                      "buildType": "https://git.johnwilger.com/jwilger/auto_review/.forgejo/workflows/release-publish.yml@v1",
                      "externalParameters": {"releaseVersion": version, "releaseMergeSha": source},
                      "internalParameters": {},
                      "resolvedDependencies": [
                          {"uri": "git+https://git.johnwilger.com/jwilger/auto_review", "digest": {"gitCommit": source}},
                          {"uri": "nix-store:" + x86_out, "name": "packages.x86_64-linux.ar-cli-portable-release-root"},
                      ],
                  },
                  "runDetails": {
                      "builder": {"id": "https://git.johnwilger.com/jwilger/auto_review/actions/release-publish"},
                      "metadata": {"invocationId": source, "startedOn": generated_at, "finishedOn": generated_at},
                  },
              },
          }
          pathlib.Path(f"auto-review-{version}-provenance.json").write_text(json.dumps(provenance, indent=2, sort_keys=True) + "\n")
          PY
            nix develop --command ssh-keygen -Y sign -f "$signing_key" -n file SHA256SUMS
            nix develop --command ssh-keygen -y -f "$signing_key" > release-signing-key.pub
            printf '%s %s\n' "$RELEASE_BOT_EMAIL" "$(cat release-signing-key.pub)" > allowed-signers
            sha256sum -c SHA256SUMS
            nix develop --command ssh-keygen -Y verify -f allowed-signers -I "$RELEASE_BOT_EMAIL" -n file -s SHA256SUMS.sig < SHA256SUMS
          )
      - name: Build Docker image after merge
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          nix develop --command nix build .#ar-gateway-image
      - name: Resolve trusted release publication tools
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        run: |
          set -euo pipefail
          SKOPEO=/nix/var/nix/profiles/default/bin/skopeo
          TEA=/nix/var/nix/profiles/default/bin/tea
          JQ=/nix/var/nix/profiles/default/bin/jq
          CURL=/nix/var/nix/profiles/default/bin/curl
          AWK=/nix/var/nix/profiles/default/bin/awk
          SED=/nix/var/nix/profiles/default/bin/sed
          MKTEMP=/nix/var/nix/profiles/default/bin/mktemp
          CAT=/nix/var/nix/profiles/default/bin/cat
          MKDIR=/nix/var/nix/profiles/default/bin/mkdir
          [ -x "$SKOPEO" ]
          [ -x "$TEA" ]
          [ -x "$JQ" ]
          [ -x "$CURL" ]
          [ -x "$AWK" ]
          [ -x "$SED" ]
          [ -x "$MKTEMP" ]
          [ -x "$CAT" ]
          [ -x "$MKDIR" ]
          printf 'SKOPEO=%s\n' "$SKOPEO" >> "$GITHUB_ENV"
          printf 'TEA=%s\n' "$TEA" >> "$GITHUB_ENV"
          printf 'JQ=%s\n' "$JQ" >> "$GITHUB_ENV"
          printf 'CURL=%s\n' "$CURL" >> "$GITHUB_ENV"
          printf 'AWK=%s\n' "$AWK" >> "$GITHUB_ENV"
          printf 'SED=%s\n' "$SED" >> "$GITHUB_ENV"
          printf 'MKTEMP=%s\n' "$MKTEMP" >> "$GITHUB_ENV"
          printf 'CAT=%s\n' "$CAT" >> "$GITHUB_ENV"
          printf 'MKDIR=%s\n' "$MKDIR" >> "$GITHUB_ENV"
      - name: Publish Docker image to Forgejo package registry
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        env:
          RELEASE_PUBLISH_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN }}
          RELEASE_BOT_NAME: ${{ vars.RELEASE_BOT_NAME }}
        run: |
          set -euo pipefail
          "$MKDIR" -p "$HOME/.config/containers"
          "$CAT" > "$HOME/.config/containers/policy.json" <<'EOF'
          {
            "default": [
              {
                "type": "insecureAcceptAnything"
              }
            ]
          }
          EOF
          if [ -z "${RELEASE_PUBLISH_TOKEN:-}" ]; then
            printf 'missing RELEASE_PUBLISH_TOKEN\n' >&2
            exit 1
          fi
          if [ -z "${RELEASE_BOT_NAME:-}" ]; then
            printf 'missing RELEASE_BOT_NAME repository variable\n' >&2
            exit 1
          fi
          "$SKOPEO" copy --dest-creds "${RELEASE_BOT_NAME}:$RELEASE_PUBLISH_TOKEN" docker-archive:./result "docker://git.johnwilger.com/jwilger/auto_review/ar-gateway:$RELEASE_VERSION"
          "$SKOPEO" copy --dest-creds "${RELEASE_BOT_NAME}:$RELEASE_PUBLISH_TOKEN" docker-archive:./result "docker://git.johnwilger.com/jwilger/auto_review/ar-gateway:latest"
      - name: Create Forgejo Release
        if: ${{ github.event_name == 'workflow_dispatch' || env.SHOULD_PUBLISH_RELEASE == 'true' }}
        env:
          GITEA_SERVER_TOKEN: ${{ secrets.RELEASE_PUBLISH_TOKEN }}
          GITEA_SERVER_URL: https://git.johnwilger.com
          RELEASE_BOT_EMAIL: ${{ vars.RELEASE_BOT_EMAIL }}
        run: |
          set -euo pipefail
          RELEASE_NOTES_FILE="$($MKTEMP)"
          # Generate notes from the finalized CHANGELOG.md ## [$RELEASE_VERSION] section.
          "$AWK" "/^## \\[$RELEASE_VERSION\\]/{emit=1; next} /^## \\[/{if (emit) exit} emit {print}" CHANGELOG.md > "$RELEASE_NOTES_FILE"
          printf '\nDocker image: git.johnwilger.com/jwilger/auto_review/ar-gateway:%s\n' "$RELEASE_VERSION" >> "$RELEASE_NOTES_FILE"
          printf '\nLinux binary archive:\n- auto-review-%s-linux-x86_64.tar.gz\n' "$RELEASE_VERSION" >> "$RELEASE_NOTES_FILE"
          printf '\nVerify downloads before use:\n```bash\nsha256sum -c SHA256SUMS\nssh-keygen -Y verify -f allowed-signers -I %s -n file -s SHA256SUMS.sig < SHA256SUMS\n```\n' "$RELEASE_BOT_EMAIL" >> "$RELEASE_NOTES_FILE"
          tea_login="auto_review-release-publish-${GITHUB_RUN_ID:-$$}"
          "$TEA" login add --name "$tea_login" --url "$GITEA_SERVER_URL" --token "$GITEA_SERVER_TOKEN"
          "$TEA" release create \
            --login "$tea_login" \
            --repo jwilger/auto_review \
            --tag v$RELEASE_VERSION \
            --target "$RELEASE_MERGE_SHA" \
            --title "v$RELEASE_VERSION" \
            --note-file "$RELEASE_NOTES_FILE" \
            --asset release-artifacts/auto-review-$RELEASE_VERSION-linux-x86_64.tar.gz \
            --asset release-artifacts/SHA256SUMS \
            --asset release-artifacts/SHA256SUMS.sig \
            --asset release-artifacts/release-signing-key.pub \
            --asset release-artifacts/allowed-signers \
            --asset release-artifacts/auto-review-$RELEASE_VERSION-sbom.spdx.json \
            --asset release-artifacts/auto-review-$RELEASE_VERSION-provenance.json
