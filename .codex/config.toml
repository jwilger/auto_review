[features]
hooks = true
multi_agent = true

[agents]
max_threads = 4
max_depth = 1

[mcp_servers.forgejo]
command = "sh"
args = [
  "-lc",
  "exec forgejo-mcp --transport stdio --url https://git.johnwilger.com --token \"$FORGEJO_TOKEN\" --user-agent auto_review/forgejo-mcp",
]
env_vars = ["FORGEJO_TOKEN"]
startup_timeout_sec = 10
tool_timeout_sec = 60
enabled = true

[mcp_servers.forgejo.env]
FORGEJO_USER_AGENT = "auto_review/forgejo-mcp"
